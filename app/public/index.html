<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retail Pro Max</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --primary:#6366f1;
    --bg:#f8fafc;
    --card:rgba(255,255,255,0.7);
    --text:#0f172a;
}

body.dark {
    --bg:#0f172a;
    --card:rgba(30,41,59,0.7);
    --text:#f1f5f9;
}

body {
    margin:0;
    font-family:'Inter';
    background:var(--bg);
    color:var(--text);
    display:flex;
}

/* Sidebar */
.sidebar {
    width:230px;
    background:#111827;
    color:white;
    padding:20px;
}

.sidebar li {
    padding:12px;
    cursor:pointer;
    border-radius:8px;
}

.sidebar li:hover {
    background:rgba(255,255,255,0.1);
}

/* Main */
.main {
    flex:1;
    padding:20px;
}

/* Navbar */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.search {
    width:40%;
    padding:10px;
    border-radius:10px;
    border:none;
}

/* Category Chips */
.chips {
    margin-top:15px;
}
.chip {
    display:inline-block;
    padding:8px 12px;
    margin:5px;
    background:#e2e8f0;
    border-radius:20px;
    cursor:pointer;
}

/* Grid */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

/* Card */
.card {
    background:var(--card);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:15px;
    transition:0.3s;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card:hover {
    transform:translateY(-5px) scale(1.02);
}

/* Product Image SVG */
.product-img {
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    background:#e0e7ff;
    border-radius:10px;
}

/* Badge */
.badge {
    background:red;
    color:white;
    padding:3px 6px;
    border-radius:5px;
    font-size:12px;
}

/* Rating */
.star {
    color:gold;
}

/* Cart */
.cart {
    position:fixed;
    right:-350px;
    top:0;
    width:320px;
    height:100%;
    background:white;
    padding:20px;
    transition:0.3s;
    overflow:auto;
}
.cart.active { right:0; }

.overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
}
.overlay.active { display:block; }

/* Toast */
.toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#22c55e;
    color:white;
    padding:10px;
    border-radius:8px;
    display:none;
}

/* Modal */
.modal {
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:10px;
    display:none;
}

/* Mobile */
@media(max-width:768px){
    .sidebar { display:none; }
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🛒 Retail</h2>
    <li onclick="filter('All')">All</li>
    <li onclick="filter('Electronics')">Electronics</li>
    <li onclick="filter('Fashion')">Fashion</li>
    <li onclick="filter('Home')">Home</li>
</div>

<!-- Main -->
<div class="main">

<div class="navbar">
    <input class="search" placeholder="Search..." onkeyup="search(this.value)">
    <div>
        <i class="fa fa-moon" onclick="toggleDark()"></i>
        <i class="fa fa-shopping-cart" onclick="toggleCart()"></i>
    </div>
</div>

<!-- Chips -->
<div class="chips">
    <span class="chip" onclick="filter('All')">All</span>
    <span class="chip" onclick="filter('Electronics')">Electronics</span>
    <span class="chip" onclick="filter('Fashion')">Fashion</span>
    <span class="chip" onclick="filter('Home')">Home</span>
</div>

<!-- Products -->
<div class="grid" id="products"></div>

</div>

<!-- Cart -->
<div class="cart" id="cart">
    <h2>Cart</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button onclick="clearCart()">Clear Cart</button>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="toast" id="toast">Added to cart</div>

<div class="modal" id="modal"></div>

<script>
const products = [
 {id:1,name:"Laptop",price:50000,cat:"Electronics",icon:"💻",rating:5},
 {id:2,name:"Phone",price:20000,cat:"Electronics",icon:"📱",rating:4},
 {id:3,name:"Shoes",price:3000,cat:"Fashion",icon:"👟",rating:4},
 {id:4,name:"Watch",price:5000,cat:"Fashion",icon:"⌚",rating:5},
 {id:5,name:"Chair",price:1500,cat:"Home",icon:"🪑",rating:3},
 {id:6,name:"Headphones",price:2500,cat:"Electronics",icon:"🎧",rating:5}
];

let cart = [];

/* Render */
function render(data){
    const box = document.getElementById("products");
    box.innerHTML = "";

    data.forEach(p=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div class="product-img">${p.icon}</div>
            <h4>${p.name}</h4>
            <div>${"★".repeat(p.rating)}</div>
            <p>₹${p.price} <span class="badge">20% OFF</span></p>
            <button onclick="add(${p.id})">Add</button>
            <button onclick="view(${p.id})">View</button>
        `;
        box.appendChild(div);
    });
}

/* Cart */
function add(id){
    const item = products.find(p=>p.id===id);
    cart.push({...item,qty:1});
    updateCart();
    toast();
}

function updateCart(){
    const box = document.getElementById("cartItems");
    box.innerHTML="";
    let total=0;

    if(cart.length===0){
        box.innerHTML="<p>Cart Empty 🛒</p>";
        return;
    }

    cart.forEach((c,i)=>{
        total += c.price * c.qty;

        box.innerHTML += `
        <div>
            ${c.name} 
            <button onclick="qty(${i},1)">+</button>
            <button onclick="qty(${i},-1)">-</button>
            <button onclick="remove(${i})">❌</button>
        </div>`;
    });

    document.getElementById("total").innerText="Total ₹"+total;
}

function qty(i,val){
    cart[i].qty += val;
    if(cart[i].qty<=0) cart.splice(i,1);
    updateCart();
}

function remove(i){
    cart.splice(i,1);
    updateCart();
}

function clearCart(){
    cart=[];
    updateCart();
}

/* Filter */
function filter(cat){
    if(cat==="All") render(products);
    else render(products.filter(p=>p.cat===cat));
}

function search(val){
    render(products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase())));
}

/* Modal */
function view(id){
    const p = products.find(x=>x.id===id);
    const m = document.getElementById("modal");
    m.style.display="block";
    m.innerHTML = `<h2>${p.name}</h2><p>₹${p.price}</p><button onclick="m.style.display='none'">Close</button>`;
}

/* UI */
function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function toast(){
    const t=document.getElementById("toast");
    t.style.display="block";
    setTimeout(()=>t.style.display="none",2000);
}

render(products);
</script>

</body>
</html>
